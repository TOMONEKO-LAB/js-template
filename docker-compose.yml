services:
  app:
    build:
      context: .
    image: js-app
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/**
            - .git/**
            - .vscode/**
        - action: rebuild
          path: ./package.json

  pkgs:
    build:
      context: .
      dockerfile: Dockerfile
    image: js-app
    working_dir: /app
    volumes:
      - ./node_modules:/app/node_modules
    command: npm install

  set-up:
    build:
      context: .
      dockerfile: Dockerfile
    image: js-app
    working_dir: /app
    volumes:
      - .:/app
    command: ./setup.sh

volumes:
  node_modules:
